name: embryo-vnc-align-napari-frontend
display_name: Embryo VNC Align Frontend
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: embryo-vnc-align-napari-frontend.make_container_widget
      python_name: embryo_vnc_align_napari_frontend:ImageThreshold
      title: Make threshold Container widget
    - id: embryo-vnc-align-napari-frontend.make_magic_widget
      python_name: embryo_vnc_align_napari_frontend:threshold_magic_widget
      title: Make threshold magic widget
    - id: embryo-vnc-align-napari-frontend.make_function_widget
      python_name: embryo_vnc_align_napari_frontend:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: embryo-vnc-align-napari-frontend.make_qwidget
      python_name: embryo_vnc_align_napari_frontend:ExampleQWidget
      title: Make example QWidget
  widgets:
    - command: embryo-vnc-align-napari-frontend.make_container_widget
      display_name: Container Threshold
    - command: embryo-vnc-align-napari-frontend.make_magic_widget
      display_name: Magic Threshold
    - command: embryo-vnc-align-napari-frontend.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: embryo-vnc-align-napari-frontend.make_qwidget
      display_name: Example QWidget
